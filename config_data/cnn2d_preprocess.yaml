raw:
  exp_folder_name: Oskar_data_generation_large_run_q6m2y45l800u200_L60
  file_name: atmos_daily_interp.nc

processing:
  name: cnn2d
  dataset_type: SimpleDatasetCNN2D
  params:
    vars:
      - temp
      - ucomp
      - vcomp
    level_dim: pfull
    lat_dim: lat
    lon_dim: lon
    time_dim: time
    time_chunk: 500
    time_start: 4300
    max_timesteps: 700
    shard_pairs: 10000
    add_coords: trig4 # trig4, trig2, null

split: [0, 0, 1.0] # False or stats_path or list of splits (must sum to 1)
stats_path: data/processed/cnn2d_coordinates_trig4_1000_to_3500_postprocessed_with_ssw/stats.pt

output:
  dataset_name: cnn2d_coordinates_trig4_4300_to_5000_postprocessed_with_ssw_test_only
